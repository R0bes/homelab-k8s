repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^k8s/homepage/templates/|^k8s/keycloak/templates/|^k8s/oauth2-proxy/templates/|\.example\.yaml$|^k8s/traefik/middleware-forward-auth-oauth2\.yaml$
      - id: check-added-large-files
        exclude: ^k8s/.+/charts/.+\.tgz$
      - id: check-merge-conflict

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.86.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
