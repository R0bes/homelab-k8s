---
# One-time / rotation: Keycloak admin, config-cli env (Grafana + Argo client secrets), Grafana OAuth secret, Argo OIDC patch.
# Requires: kubectl, openssl. Set KUBECONFIG to your homelab kubeconfig.
#
#   export KUBECONFIG=~/.kube/homelab.yaml
#   ansible-playbook -i ../inventory/hosts.yml keycloak-bootstrap-secrets.yml
- name: Bootstrap Keycloak and OIDC client secrets
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default(lookup('env', 'HOME') ~ '/.kube/config', true) }}"

  tasks:
    - name: Ensure namespaces exist
      ansible.builtin.command:
        cmd: kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
      loop:
        - auth
        - monitoring
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Generate random secrets
      ansible.builtin.shell: |
        openssl rand -base64 32 | tr -d '\n'
      register: _admin_pw
      changed_when: false

    - name: Generate Grafana client secret
      ansible.builtin.shell: |
        openssl rand -base64 32 | tr -d '\n'
      register: _graf_pw
      changed_when: false

    - name: Generate Argo CD client secret
      ansible.builtin.shell: |
        openssl rand -base64 32 | tr -d '\n'
      register: _argo_pw
      changed_when: false

    - name: Create keycloak-admin secret
      ansible.builtin.shell: |
        kubectl create secret generic keycloak-admin -n auth \
          --from-literal=admin-password='{{ _admin_pw.stdout }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      no_log: true
      changed_when: true

    - name: Create keycloak-config-cli-env secret
      ansible.builtin.shell: |
        kubectl create secret generic keycloak-config-cli-env -n auth \
          --from-literal=GRAFANA_CLIENT_SECRET='{{ _graf_pw.stdout }}' \
          --from-literal=ARGOCD_CLIENT_SECRET='{{ _argo_pw.stdout }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      no_log: true
      changed_when: true

    - name: Create grafana-oauth secret in monitoring
      ansible.builtin.shell: |
        kubectl create secret generic grafana-oauth -n monitoring \
          --from-literal=client-secret='{{ _graf_pw.stdout }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      no_log: true
      changed_when: true

    - name: Write Argo CD OIDC patch JSON
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/.argocd-oidc-patch.json"
        mode: "0600"
        content: "{{ {'stringData': {'oidc.keycloak.clientSecret': _argo_pw.stdout }} | to_json }}"
      no_log: true

    - name: Patch argocd-secret with OIDC client secret
      ansible.builtin.command:
        argv:
          - kubectl
          - patch
          - secret
          - argocd-secret
          - -n
          - argocd
          - --type
          - merge
          - --patch-file
          - "{{ playbook_dir }}/.argocd-oidc-patch.json"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: _patch
      changed_when: _patch.rc == 0
      failed_when: _patch.rc != 0 and 'not found' not in (_patch.stderr | default(''))

    - name: Remove local patch file
      ansible.builtin.file:
        path: "{{ playbook_dir }}/.argocd-oidc-patch.json"
        state: absent

    - name: Hint restart Argo CD server
      ansible.builtin.debug:
        msg: >-
          Done. Restart Argo CD after patching OIDC secret:
          kubectl rollout restart deployment/argocd-server -n argocd
          Retrieve Keycloak admin password: kubectl get secret keycloak-admin -n auth -o jsonpath='{.data.admin-password}' | base64 -d; echo
