apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.robschwe.de`) && PathPrefix(`/outpost.goauthentik.io`)
      priority: 100
      kind: Rule
      services:
        - name: authentik-outpost
          port: 9000
    - match: Host(`argocd.robschwe.de`)
      priority: 1
      kind: Rule
      middlewares:
        - name: forward-auth-authentik
          namespace: traefik
      services:
        - name: argocd-server
          port: 80
  tls:
    certResolver: letsencrypt
