apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-outpost
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/R0bes/homelab-k8s.git
    targetRevision: HEAD
    path: k8s/monitoring-outpost
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
