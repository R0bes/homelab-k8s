apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shaderplayground
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/R0bes/homelab-k8s.git
    targetRevision: HEAD
    path: k8s/shaderplayground
  destination:
    server: https://kubernetes.default.svc
    namespace: shaderplayground
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
