# Apply before first Keycloak sync (namespace auth must exist).
#
#   kubectl create namespace auth --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl create secret generic keycloak-admin -n auth \
#     --from-literal=admin-password="$(openssl rand -base64 32 | tr -d '\n')"
#
#   kubectl create secret generic keycloak-config-cli-env -n auth \
#     --from-literal=GRAFANA_CLIENT_SECRET="$(openssl rand -base64 32 | tr -d '\n')" \
#     --from-literal=ARGOCD_CLIENT_SECRET="$(openssl rand -base64 32 | tr -d '\n')"
#
# Use the same GRAFANA_CLIENT_SECRET value in Secret grafana-oauth (key client-secret).
# Use the same ARGOCD_CLIENT_SECRET in argocd-secret (key oidc.keycloak.clientSecret, base64).
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: auth
type: Opaque
stringData:
  admin-password: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-config-cli-env
  namespace: auth
type: Opaque
stringData:
  GRAFANA_CLIENT_SECRET: REPLACE_ME
  ARGOCD_CLIENT_SECRET: REPLACE_ME
