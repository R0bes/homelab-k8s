{{- range .Values.proxies }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ops.fullname" . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/instance: {{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
      app.kubernetes.io/instance: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
        app.kubernetes.io/instance: {{ .name }}
    spec:
      containers:
        - name: oauth2-proxy
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          args:
            - --provider=oidc
            - --oidc-issuer-url={{ $.Values.issuer }}
            - --client-id={{ $.Values.clientId }}
            - --client-secret=
            - --redirect-url=https://{{ .host }}/oauth2/callback
            - --scope=openid email profile
            - --code-challenge-method=S256
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-name={{ .cookieName }}
            - --upstream=static://200
            - --skip-provider-button=true
            - --set-xauthrequest=true
            - --reverse-proxy=true
          ports:
            - name: http
              containerPort: 4180
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
{{- end }}
