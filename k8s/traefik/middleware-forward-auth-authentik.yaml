# Forward auth to Authentik embedded outpost. Configure in Authentik UI:
# Proxy provider, mode "Forward auth (domain level)", External host https://auth.robschwe.de
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth-authentik
  namespace: traefik
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
