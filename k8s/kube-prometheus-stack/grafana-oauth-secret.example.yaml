# Apply in namespace monitoring (same value as Keycloak client "grafana" secret from keycloak-config-cli-env).
#
#   kubectl create secret generic grafana-oauth -n monitoring \
#     --from-literal=client-secret="YOUR_GRAFANA_CLIENT_SECRET"
apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth
  namespace: monitoring
type: Opaque
stringData:
  client-secret: REPLACE_ME
