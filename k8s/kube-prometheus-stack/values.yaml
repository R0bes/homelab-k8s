# Overrides for dependency kube-prometheus-stack (see Chart.yaml).
# Grafana admin password is generated into a Secret by the Grafana subchart (retrieve after install if needed).
# Create Secret grafana-oauth in namespace monitoring with key client-secret (same value as Keycloak grafana client).

kube-prometheus-stack:
  fullnameOverride: ""

  defaultRules:
    create: true

  # k3s: control plane metrics not exposed like kubeadm
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi

  grafana:
    enabled: true
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    initChownData:
      enabled: false
    grafana.ini:
      server:
        domain: grafana.robschwe.de
        root_url: https://grafana.robschwe.de/
    env:
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid email profile
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.robschwe.de/realms/homelab/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://auth.robschwe.de/realms/homelab/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: https://auth.robschwe.de/realms/homelab/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-oauth
          key: client-secret
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - grafana.robschwe.de
      path: /
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
        traefik.ingress.kubernetes.io/router.priority: "1"
    persistence:
      enabled: true
      type: pvc
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi

  prometheus:
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - prometheus.robschwe.de
      paths:
        - /
      pathType: Prefix
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
        traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth-oauth2-prometheus@kubernetescrd
        traefik.ingress.kubernetes.io/router.priority: "1"
    prometheusSpec:
      externalUrl: https://prometheus.robschwe.de
      retention: 15d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
