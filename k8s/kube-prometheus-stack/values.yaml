# Overrides for dependency kube-prometheus-stack (see Chart.yaml).
# Create namespace `monitoring` and Secret `grafana-admin` before first sync:
#   kubectl create secret generic grafana-admin -n monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password="$(openssl rand -base64 18)"

kube-prometheus-stack:
  fullnameOverride: ""

  defaultRules:
    create: true

  # k3s: control plane metrics not exposed like kubeadm
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi

  grafana:
    enabled: true
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - grafana.robschwe.de
      path: /
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    persistence:
      enabled: true
      type: pvc
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi

  prometheus:
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - prometheus.robschwe.de
      paths:
        - /
      pathType: Prefix
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    prometheusSpec:
      retention: 15d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
