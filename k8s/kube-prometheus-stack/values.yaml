# Overrides for dependency kube-prometheus-stack (see Chart.yaml).
# Grafana admin password is generated into a Secret by the Grafana subchart (retrieve after install if needed).

kube-prometheus-stack:
  fullnameOverride: ""

  defaultRules:
    create: true

  # k3s: control plane metrics not exposed like kubeadm
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi

  grafana:
    enabled: true
    grafana.ini:
      server:
        domain: grafana.robschwe.de
        root_url: https://grafana.robschwe.de/
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - grafana.robschwe.de
      path: /
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
        traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth-authentik@kubernetescrd
        traefik.ingress.kubernetes.io/router.priority: "1"
    persistence:
      enabled: true
      type: pvc
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 5Gi

  prometheus:
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - prometheus.robschwe.de
      paths:
        - /
      pathType: Prefix
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
        traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth-authentik@kubernetescrd
        traefik.ingress.kubernetes.io/router.priority: "1"
    prometheusSpec:
      externalUrl: https://prometheus.robschwe.de
      retention: 15d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
