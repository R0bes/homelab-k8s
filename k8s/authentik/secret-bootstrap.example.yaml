# Example: create bootstrap secret before syncing the authentik Argo Application.
# Keys must match k8s/authentik/values.yaml (Bitnami + authentik existingSecret).
apiVersion: v1
kind: Secret
metadata:
  name: authentik-bootstrap
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: REPLACE_WITH_LONG_RANDOM_STRING
  postgresql-password: REPLACE_WITH_DB_PASSWORD
