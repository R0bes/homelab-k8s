# Apply once before / with first Authentik sync (namespace authentik must exist).
#
#   kubectl create namespace authentik --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic authentik-bootstrap -n authentik \
#     --from-literal=AUTHENTIK_SECRET_KEY="$(openssl rand -base64 48 | tr -d '\n')"
#
# Keep AUTHENTIK_SECRET_KEY stable after the first successful install.
# Database credentials are created by the Helm chart (Secret authentik-postgresql).
apiVersion: v1
kind: Secret
metadata:
  name: authentik-bootstrap
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: REPLACE_WITH_OPENSSL_RAND_BASE64_48
