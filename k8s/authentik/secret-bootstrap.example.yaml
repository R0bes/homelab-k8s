# Optional: only if you switch authentik values to use existingSecret for rotation.
# Default install uses Helm-managed secrets (no manual Secret required).
apiVersion: v1
kind: Secret
metadata:
  name: authentik-bootstrap
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: REPLACE_WITH_LONG_RANDOM_STRING
  postgresql-password: REPLACE_WITH_DB_PASSWORD
