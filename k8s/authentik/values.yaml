# Subchart values (dependency name: authentik).
# Chart creates authentik + PostgreSQL secrets on install (no manual bootstrap Secret required).

authentik:
  global:
    affinity:
      podAntiAffinity: none
      nodeAffinity:
        type: none

  postgresql:
    enabled: true

  server:
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - auth.robschwe.de
      paths:
        - /
      pathType: Prefix
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt

  worker:
    replicas: 1
