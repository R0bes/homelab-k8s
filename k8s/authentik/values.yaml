# Subchart values (dependency name: authentik).
# Required once: Secret `authentik-bootstrap` with AUTHENTIK_SECRET_KEY (see secret-bootstrap.example.yaml).
# Chart omits AUTHENTIK_SECRET_KEY from the generated Secret when secret_key is empty; inject via global.env.
# PostgreSQL password is managed by the chart (Secret authentik-postgresql); do not duplicate it in bootstrap.

authentik:
  global:
    affinity:
      podAntiAffinity: none
      nodeAffinity:
        type: none
    env:
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-bootstrap
            key: AUTHENTIK_SECRET_KEY

  postgresql:
    enabled: true

  server:
    ingress:
      enabled: true
      ingressClassName: traefik-helm
      hosts:
        - auth.robschwe.de
      paths:
        - /
      pathType: Prefix
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt

  worker:
    replicas: 1
