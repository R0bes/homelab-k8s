# Production / homelab-k8s cluster.
#
# Operator checklist (not automated):
# - Secret homepage-content-git (GitHub PAT for private homepage-content clone).
# - Secret ghcr-pull (docker-registry for ghcr.io if the app image is private): same PAT often works with username R0bes.
# - Point DNS for ingress.host (and demo embed hosts) at the Traefik LoadBalancer IP when cutting over.

app:
  imagePullSecrets:
    - name: ghcr-pull

ingress:
  host: robschwe.de
  # Must match cluster IngressClass (Traefik Helm release uses traefik-helm).
  className: traefik-helm
  # HTTP-01 challenge uses web; HTTPS uses websecure (Traefik ACME in k8s/traefik/helmrelease.yaml).
  entrypoints: web,websecure
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt

middleware:
  cacheControlNoStore:
    enabled: true

content:
  root: /data/content
  git:
    enabled: true
    existingSecret: homepage-content-git

demoEmbeds:
  - slug: 11_fourierfun
    host: fourierfun.robschwe.de
  - slug: 13_shaderplayground
    host: shaderplayground.robschwe.de
  - slug: 14_homepage
    host: robschwe.de
